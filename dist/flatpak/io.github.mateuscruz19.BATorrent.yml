app-id: io.github.mateuscruz19.BATorrent
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: BATorrent

finish-args:
  # BitTorrent + WebUI + tracker announces
  - --share=network
  # Save paths + resume data (reviewers may ask to narrow to xdg-download)
  - --filesystem=home
  # System tray
  - --talk-name=org.kde.StatusNotifierWatcher
  # Desktop notifications
  - --talk-name=org.freedesktop.Notifications
  # "Open containing folder"
  - --talk-name=org.freedesktop.FileManager1
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

modules:
  - name: boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app --with-libraries=system
      - ./b2 install variant=release link=shared threading=multi -j$FLATPAK_BUILDER_N_JOBS
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.86.0/source/boost_1_86_0.tar.gz
        sha256: 2575e74ffc3ef1cd0babac2c1ee8bdb5782a0ee672b1912da40e5b4b591ca01f

  - name: libtorrent-rasterbar
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: archive
        url: https://github.com/arvidn/libtorrent/releases/download/v2.0.10/libtorrent-rasterbar-2.0.10.tar.gz
        sha256: fc935b8c1daca5c0a4d304bff59e64e532be16bb877c012aea4bda73d9ca885d

  - name: batorrent
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: archive
        url: https://github.com/Mateuscruz19/BATorrent/archive/refs/tags/v3.0.3.tar.gz
        sha256: 8db56af53287b22fe819a385c1deae5e28131ac710673c92d2a5f4d62abdefeb
      # Shipped from the Flathub PR (not yet in the v3.0.3 tarball):
      - type: file
        path: io.github.mateuscruz19.BATorrent.metainfo.xml
      - type: file
        path: io.github.mateuscruz19.BATorrent.png
    post-install:
      - rm -f /app/share/applications/batorrent.desktop
      - rm -f /app/share/icons/hicolor/*/apps/batorrent.png
      - install -Dm644 dist/batorrent.desktop /app/share/applications/io.github.mateuscruz19.BATorrent.desktop
      - sed -i 's/^Icon=.*/Icon=io.github.mateuscruz19.BATorrent/' /app/share/applications/io.github.mateuscruz19.BATorrent.desktop
      - install -Dm644 io.github.mateuscruz19.BATorrent.png /app/share/icons/hicolor/512x512/apps/io.github.mateuscruz19.BATorrent.png
      - install -Dm644 io.github.mateuscruz19.BATorrent.metainfo.xml /app/share/metainfo/io.github.mateuscruz19.BATorrent.metainfo.xml
