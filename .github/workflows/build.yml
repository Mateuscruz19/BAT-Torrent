name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ qt6-base-dev libqt6widgets6 \
            libtorrent-rasterbar-dev libboost-dev libssl-dev libfuse2

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build

      - name: Install to AppDir
        run: |
          DESTDIR=$PWD/AppDir cmake --install build

      - name: Resize icon to 256x256
        run: |
          sudo apt-get install -y imagemagick
          convert AppDir/usr/share/icons/hicolor/256x256/apps/batorrent.png \
            -resize 256x256 \
            AppDir/usr/share/icons/hicolor/256x256/apps/batorrent.png

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export QMAKE=$(which qmake6 2>/dev/null || which qmake)
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --plugin qt \
            --desktop-file AppDir/usr/share/applications/batorrent.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/batorrent.png \
            --output appimage
          mv BATorrent-*.AppImage BATorrent-linux-x86_64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: BATorrent-linux-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "C:\vcpkg" >> $env:GITHUB_PATH

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-libtorrent-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: vcpkg-windows-libtorrent-

      - name: Install libtorrent via vcpkg
        run: C:\vcpkg\vcpkg install libtorrent:x64-windows

      - name: Convert PNG to multi-resolution ICO
        run: |
          choco install imagemagick -y --no-progress
          magick src/images/logo1.png -define icon:auto-resize=256,64,48,32,16 src/images/logo1.ico

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          mkdir release
          Copy-Item build/Release/BATorrent.exe release/
          windeployqt release/BATorrent.exe
          $vcpkgBin = "$env:VCPKG_ROOT/installed/x64-windows/bin"
          Get-ChildItem "$vcpkgBin/*.dll" | Copy-Item -Destination release/
          Compress-Archive -Path release/* -DestinationPath BATorrent-windows-x86_64.zip

      - name: Build Installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\batorrent.iss

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: BATorrent-windows-x86_64.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: output/BATorrent-setup-x86_64.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake qt@6 libtorrent-rasterbar boost openssl

      - name: Build
        run: |
          export Qt6_DIR=$(brew --prefix qt@6)/lib/cmake/Qt6
          export CMAKE_PREFIX_PATH=$(brew --prefix qt@6):$(brew --prefix libtorrent-rasterbar):$(brew --prefix openssl)
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH"
          cmake --build build

      - name: Create app bundle
        run: |
          mkdir -p dmg/BATorrent.app/Contents/MacOS
          mkdir -p dmg/BATorrent.app/Contents/Resources
          cp build/BATorrent dmg/BATorrent.app/Contents/MacOS/
          printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' '<dict>' \
            '  <key>CFBundleExecutable</key>' '  <string>BATorrent</string>' \
            '  <key>CFBundleIdentifier</key>' '  <string>com.mateuscruz19.batorrent</string>' \
            '  <key>CFBundleName</key>' '  <string>BATorrent</string>' \
            '  <key>CFBundleVersion</key>' '  <string>1.8.0</string>' \
            '  <key>CFBundleShortVersionString</key>' '  <string>1.8.0</string>' \
            '  <key>CFBundlePackageType</key>' '  <string>APPL</string>' \
            '  <key>CFBundleIconFile</key>' '  <string>batorrent</string>' \
            '  <key>LSMinimumSystemVersion</key>' '  <string>12.0</string>' \
            '  <key>NSHighResolutionCapable</key>' '  <true/>' \
            '  <key>CFBundleDocumentTypes</key>' '  <array>' '    <dict>' \
            '      <key>CFBundleTypeExtensions</key>' '      <array><string>torrent</string></array>' \
            '      <key>CFBundleTypeName</key>' '      <string>Torrent File</string>' \
            '      <key>CFBundleTypeRole</key>' '      <string>Viewer</string>' \
            '    </dict>' '  </array>' \
            '  <key>CFBundleURLTypes</key>' '  <array>' '    <dict>' \
            '      <key>CFBundleURLName</key>' '      <string>Magnet Link</string>' \
            '      <key>CFBundleURLSchemes</key>' '      <array><string>magnet</string></array>' \
            '    </dict>' '  </array>' \
            '</dict>' '</plist>' > dmg/BATorrent.app/Contents/Info.plist

      - name: Create ICNS icon
        run: |
          mkdir -p batorrent.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size src/images/logo1.png --out batorrent.iconset/icon_${size}x${size}.png
          done
          for size in 32 64 256 512; do
            half=$((size / 2))
            cp batorrent.iconset/icon_${size}x${size}.png batorrent.iconset/icon_${half}x${half}@2x.png
          done
          iconutil -c icns batorrent.iconset -o dmg/BATorrent.app/Contents/Resources/batorrent.icns

      - name: Deploy Qt and create DMG
        run: |
          $(brew --prefix qt@6)/bin/macdeployqt dmg/BATorrent.app
          # Ad-hoc codesign so Gatekeeper doesn't block
          codesign --force --deep --sign - dmg/BATorrent.app
          hdiutil create -volname BATorrent -srcfolder dmg -ov -format UDZO BATorrent-macos-arm64.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: BATorrent-macos-arm64.dmg

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-build/BATorrent-linux-x86_64.AppImage
            windows-zip/BATorrent-windows-x86_64.zip
            windows-installer/BATorrent-setup-x86_64.exe
            macos-build/BATorrent-macos-arm64.dmg
          generate_release_notes: true
