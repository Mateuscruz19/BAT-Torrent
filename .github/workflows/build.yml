name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ qt6-base-dev libqt6widgets6 \
            libtorrent-rasterbar-dev libboost-dev libssl-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        run: |
          mkdir -p release
          cp build/BATorrent release/
          cd release && tar czf ../BATorrent-linux-x86_64.tar.gz BATorrent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: BATorrent-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '01f602195983451bc83e72f4214af2cbc495aa94'

      - name: Install libtorrent via vcpkg
        run: vcpkg install libtorrent:x64-windows

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          mkdir release
          Copy-Item build/Release/BATorrent.exe release/
          windeployqt release/BATorrent.exe
          $vcpkgBin = "$env:VCPKG_ROOT/installed/x64-windows/bin"
          Get-ChildItem "$vcpkgBin/*.dll" | Copy-Item -Destination release/
          Compress-Archive -Path release/* -DestinationPath BATorrent-windows-x86_64.zip

      - name: Convert PNG to ICO
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $png = [System.Drawing.Image]::FromFile("$PWD\src\images\logo1.png")
          $ico = New-Object System.Drawing.Icon([System.Drawing.Bitmap]$png, 256, 256)
          $stream = [System.IO.File]::Create("$PWD\src\images\logo1.ico")
          $ico.Save($stream)
          $stream.Close()

      - name: Build Installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\batorrent.iss

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: BATorrent-windows-x86_64.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: output/BATorrent-setup-x86_64.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-build/BATorrent-linux-x86_64.tar.gz
            windows-zip/BATorrent-windows-x86_64.zip
            windows-installer/BATorrent-setup-x86_64.exe
          generate_release_notes: true
