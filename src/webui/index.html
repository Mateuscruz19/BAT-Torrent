<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BATorrent</title>
<link rel="icon" href="data:image/svg+xml,<svg viewBox='0 0 100 80' xmlns='http://www.w3.org/2000/svg'><path d='M50 72C50 72 8 50 2 20C2 20 18 35 35 28C35 28 42 22 50 8C58 22 65 28 65 28C82 35 98 20 98 20C92 50 50 72 50 72Z' fill='%23dc2626'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --void: #050507;
  --abyss: #09090c;
  --surface: #0f0f14;
  --elevated: #16161d;
  --card: #1a1a23;
  --hover: #20202b;
  --active: #282836;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.1);
  --border-focus: rgba(220,38,38,0.4);
  --text: #b8b8c8;
  --text-bright: #e4e4f0;
  --text-dim: #7a7a90;
  --text-muted: #4a4a5e;
  --crimson: #dc2626;
  --crimson-hot: #ef4444;
  --crimson-deep: #7f1d1d;
  --crimson-glow: rgba(220,38,38,0.15);
  --crimson-glow-hot: rgba(239,68,68,0.25);
  --emerald: #10b981;
  --emerald-glow: rgba(16,185,129,0.12);
  --amber: #f59e0b;
  --amber-glow: rgba(245,158,11,0.12);
  --sky: #38bdf8;
  --sky-glow: rgba(56,189,248,0.12);
  --font: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --mono: 'IBM Plex Mono', 'Consolas', monospace;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
}

html { font-size: 14px; }
body {
  font-family: var(--font);
  background: var(--void);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Animated grid background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(220,38,38,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(220,38,38,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 0%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* ── Ambient glow ── */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 500px;
  background: radial-gradient(ellipse, rgba(220,38,38,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ── Selection ── */
::selection { background: rgba(220,38,38,0.3); color: var(--text-bright); }

/* ── App Layout ── */
.app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ══════════════════════════════════════
   HEADER
   ══════════════════════════════════════ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(5,5,7,0.8);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 60px;
  max-width: 1600px;
  margin: 0 auto;
  width: 100%;
}

/* Brand */
.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-icon {
  width: 32px;
  height: 32px;
  position: relative;
}

.brand-icon svg { width: 100%; height: 100%; }

.brand-icon::after {
  content: '';
  position: absolute;
  inset: -4px;
  background: radial-gradient(circle, rgba(220,38,38,0.2) 0%, transparent 70%);
  border-radius: 50%;
  animation: iconPulse 3s ease-in-out infinite;
}

@keyframes iconPulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.15); }
}

.brand-text {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.brand-name {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-bright);
  line-height: 1;
}

.brand-sub {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--crimson);
  line-height: 1;
}

/* Header Stats */
.header-stats {
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 12px;
  transition: all 0.3s var(--ease);
}

.stat-chip:hover { border-color: var(--border-hover); }

.stat-chip .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.stat-chip.down .dot { background: var(--emerald); box-shadow: 0 0 8px var(--emerald); }
.stat-chip.up .dot { background: var(--crimson-hot); box-shadow: 0 0 8px var(--crimson-hot); }
.stat-chip.count .dot { background: var(--sky); box-shadow: 0 0 8px var(--sky); }

.stat-chip .stat-val {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 12px;
  color: var(--text-bright);
}

.stat-chip .stat-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-chip.active .dot { animation: dotPulse 1.5s ease-in-out infinite; }

@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* Header Actions */
.header-actions {
  display: flex;
  gap: 8px;
}

/* ══════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 8px 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s var(--ease);
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.25s;
}

.btn:hover {
  background: var(--elevated);
  border-color: var(--border-hover);
  color: var(--text-bright);
  transform: translateY(-1px);
}

.btn:hover::before { opacity: 1; }
.btn:active { transform: translateY(0); }
.btn svg { width: 14px; height: 14px; flex-shrink: 0; }

.btn-primary {
  background: var(--crimson);
  border-color: var(--crimson);
  color: #fff;
  box-shadow: 0 2px 12px rgba(220,38,38,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
}

.btn-primary:hover {
  background: var(--crimson-hot);
  border-color: var(--crimson-hot);
  box-shadow: 0 4px 24px rgba(220,38,38,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
}

.btn-ghost {
  background: transparent;
  border-color: transparent;
  padding: 8px 10px;
}
.btn-ghost:hover { background: var(--hover); border-color: transparent; }

.btn-danger { color: var(--crimson-hot); }
.btn-danger:hover { background: var(--crimson-glow); border-color: rgba(220,38,38,0.2); }

.btn-sm { padding: 5px 12px; font-size: 11px; border-radius: var(--radius-xs); }
.btn-xs { padding: 4px 8px; font-size: 10px; border-radius: var(--radius-xs); }
.btn-icon { padding: 8px; }

/* ══════════════════════════════════════
   TOOLBAR
   ══════════════════════════════════════ */
.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  gap: 12px;
  flex-wrap: wrap;
  max-width: 1600px;
  margin: 0 auto;
  width: 100%;
}

.toolbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

/* Filter pills */
.filters {
  display: flex;
  gap: 4px;
}

.filter-pill {
  padding: 6px 16px;
  border: none;
  border-radius: 100px;
  background: transparent;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s var(--ease);
  position: relative;
}

.filter-pill:hover { color: var(--text); background: var(--hover); }

.filter-pill.active {
  color: var(--text-bright);
  background: var(--elevated);
  box-shadow: inset 0 0 0 1px var(--border-hover);
}

.filter-pill .count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  margin-left: 6px;
  border-radius: 100px;
  background: var(--border);
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
  font-family: var(--mono);
}

.filter-pill.active .count {
  background: var(--crimson-glow);
  color: var(--crimson-hot);
}

/* Search */
.search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 0 16px;
  transition: all 0.3s var(--ease);
}

.search:focus-within {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(220,38,38,0.08);
  background: var(--elevated);
}

.search svg { width: 14px; height: 14px; color: var(--text-muted); flex-shrink: 0; }

.search input {
  background: none;
  border: none;
  outline: none;
  color: var(--text-bright);
  font-family: var(--font);
  font-size: 12px;
  padding: 8px 0;
  width: 180px;
}

.search input::placeholder { color: var(--text-muted); }

/* Bulk actions */
.toolbar-right { display: flex; gap: 6px; }

/* ══════════════════════════════════════
   CONTENT
   ══════════════════════════════════════ */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 1600px;
  margin: 0 auto;
  width: 100%;
  padding: 0 24px;
}

/* ══════════════════════════════════════
   TABLE
   ══════════════════════════════════════ */
.table-wrap {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--abyss);
}

.table-scroll {
  overflow: auto;
  max-height: calc(100vh - 300px);
}

table { width: 100%; border-collapse: collapse; }

thead { position: sticky; top: 0; z-index: 10; }

th {
  text-align: left;
  padding: 12px 16px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  user-select: none;
}

td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  vertical-align: middle;
  transition: background 0.15s;
}

tbody tr {
  cursor: pointer;
  transition: all 0.15s;
}

tbody tr:hover td { background: rgba(255,255,255,0.02); }
tbody tr:last-child td { border-bottom: none; }

tr.selected td {
  background: var(--crimson-glow) !important;
}

tr.selected td:first-child {
  box-shadow: inset 3px 0 0 var(--crimson);
}

/* Torrent name */
.t-name {
  max-width: 380px;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 600;
  color: var(--text-bright);
  font-size: 13px;
}

.mono {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
}

.speed-down { color: var(--emerald); }
.speed-up { color: var(--crimson-hot); }

/* ── Progress Bar ── */
.prog {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 160px;
}

.prog-track {
  flex: 1;
  height: 4px;
  background: var(--elevated);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.prog-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 0.6s var(--ease);
  position: relative;
}

.prog-fill.dl {
  background: linear-gradient(90deg, #059669, #10b981);
}

.prog-fill.dl::after {
  content: '';
  position: absolute;
  right: 0;
  top: -2px;
  bottom: -2px;
  width: 20px;
  background: linear-gradient(90deg, transparent, rgba(16,185,129,0.6));
  border-radius: 10px;
  animation: progGlow 2s ease-in-out infinite;
}

@keyframes progGlow {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

.prog-fill.seed {
  background: linear-gradient(90deg, #d97706, #f59e0b);
}

.prog-fill.paused { background: var(--text-muted); }
.prog-fill.paused::after { display: none; }

.prog-fill.done {
  background: linear-gradient(90deg, #059669, #10b981);
}
.prog-fill.done::after { display: none; }

.prog-pct {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  min-width: 40px;
  text-align: right;
}

/* ── State Badge ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.3px;
}

.badge .indicator {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.badge-downloading {
  background: var(--emerald-glow);
  color: var(--emerald);
}
.badge-downloading .indicator {
  background: var(--emerald);
  box-shadow: 0 0 6px var(--emerald);
  animation: dotPulse 1.5s ease-in-out infinite;
}

.badge-seeding { background: var(--amber-glow); color: var(--amber); }
.badge-seeding .indicator { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

.badge-paused { background: rgba(122,122,144,0.08); color: var(--text-dim); }
.badge-paused .indicator { background: var(--text-muted); }

.badge-checking { background: var(--sky-glow); color: var(--sky); }
.badge-checking .indicator { background: var(--sky); box-shadow: 0 0 6px var(--sky); animation: dotPulse 1.5s ease-in-out infinite; }

.badge-error { background: var(--crimson-glow); color: var(--crimson-hot); }
.badge-error .indicator { background: var(--crimson-hot); box-shadow: 0 0 6px var(--crimson-hot); }

.badge-other { background: rgba(122,122,144,0.08); color: var(--text-dim); }
.badge-other .indicator { background: var(--text-muted); }

/* Row actions */
.row-acts {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
tr:hover .row-acts, tr.selected .row-acts { opacity: 1; }

/* ══════════════════════════════════════
   DETAIL PANEL
   ══════════════════════════════════════ */
.detail {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--abyss);
  margin-top: 16px;
  overflow: hidden;
  display: none;
  animation: panelSlide 0.35s var(--ease);
}

.detail.open { display: block; }

@keyframes panelSlide {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.detail-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.detail-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-bright);
  max-width: 600px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.detail-close {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: var(--hover);
  color: var(--text-dim);
  border-radius: var(--radius-xs);
  cursor: pointer;
  transition: all 0.2s;
}
.detail-close:hover { background: var(--active); color: var(--text); }
.detail-close svg { width: 14px; height: 14px; }

.detail-tabs {
  display: flex;
  gap: 0;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.dtab {
  padding: 10px 20px;
  border: none;
  background: none;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}
.dtab:hover { color: var(--text); }
.dtab.active { color: var(--crimson-hot); }
.dtab.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 12px;
  right: 12px;
  height: 2px;
  background: var(--crimson);
  border-radius: 2px 2px 0 0;
}

.detail-body {
  padding: 16px 20px;
  max-height: 280px;
  overflow: auto;
}

.detail-body table { font-size: 12px; }
.detail-body th {
  background: transparent;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text-muted);
}
.detail-body td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.detail-body tr:last-child td { border-bottom: none; }

.file-path {
  max-width: 450px;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-bright);
  font-weight: 500;
}

/* ══════════════════════════════════════
   EMPTY STATE
   ══════════════════════════════════════ */
.empty {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 20px;
  text-align: center;
  gap: 20px;
}

.empty-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.empty-icon::before {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px dashed var(--border);
  animation: spin 20s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.empty-icon svg { width: 32px; height: 32px; color: var(--text-muted); }

.empty h2 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-dim);
  letter-spacing: -0.5px;
}

.empty p {
  font-size: 14px;
  color: var(--text-muted);
  max-width: 340px;
  line-height: 1.7;
}

.empty .actions { display: flex; gap: 10px; margin-top: 4px; }

/* ══════════════════════════════════════
   MODAL
   ══════════════════════════════════════ */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s var(--ease);
}
.overlay.open { display: flex; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--card);
  border: 1px solid var(--border-hover);
  border-radius: var(--radius);
  padding: 28px;
  min-width: 440px;
  max-width: 90vw;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 1px rgba(255,255,255,0.1);
  animation: modalIn 0.3s var(--ease);
  position: relative;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(12px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal h2 {
  font-size: 16px;
  font-weight: 800;
  color: var(--text-bright);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  letter-spacing: -0.3px;
}

.modal h2 svg { width: 20px; height: 20px; color: var(--crimson); }

.modal-input {
  width: 100%;
  background: var(--surface);
  color: var(--text-bright);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-family: var(--mono);
  font-size: 13px;
  margin-bottom: 20px;
  transition: all 0.25s var(--ease);
}

.modal-input:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px rgba(220,38,38,0.08);
  background: var(--elevated);
}

.modal-input::placeholder { color: var(--text-muted); }

/* File drop zone */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s var(--ease);
  background: var(--surface);
  margin-bottom: 20px;
  position: relative;
}

.drop-zone:hover,
.drop-zone.dragover {
  border-color: var(--crimson);
  background: var(--crimson-glow);
}

.drop-zone svg { width: 36px; height: 36px; color: var(--text-muted); margin-bottom: 12px; }

.drop-zone p {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
}

.drop-zone span {
  font-size: 11px;
  color: var(--text-muted);
}

.drop-zone .fname {
  margin-top: 12px;
  font-weight: 700;
  color: var(--crimson-hot);
  font-size: 13px;
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ══════════════════════════════════════
   MOBILE CARDS
   ══════════════════════════════════════ */
.cards { display: none; flex-direction: column; gap: 8px; }

.tcard {
  background: var(--abyss);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.25s var(--ease);
}

.tcard:hover { border-color: var(--border-hover); }
.tcard.selected { border-color: rgba(220,38,38,0.3); background: var(--crimson-glow); }

.tcard-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
  gap: 10px;
}

.tcard-name {
  font-weight: 700;
  font-size: 13px;
  color: var(--text-bright);
  word-break: break-word;
  line-height: 1.4;
  flex: 1;
}

.tcard-prog { margin-bottom: 12px; }

.tcard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  font-size: 11px;
}

.tcard-stat {
  display: flex;
  justify-content: space-between;
  padding: 6px 10px;
  background: var(--surface);
  border-radius: var(--radius-xs);
}

.tcard-stat .k { color: var(--text-muted); font-weight: 500; }
.tcard-stat .v { color: var(--text-bright); font-family: var(--mono); font-weight: 600; }

.tcard-acts { display: flex; gap: 6px; margin-top: 12px; }

/* ══════════════════════════════════════
   TOAST
   ══════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-bright);
  box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  z-index: 300;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: toastIn 0.35s var(--ease), toastOut 0.3s var(--ease) 2.7s forwards;
}

.toast.success { border-left: 3px solid var(--emerald); }
.toast.error { border-left: 3px solid var(--crimson); }

.toast svg { width: 16px; height: 16px; flex-shrink: 0; }
.toast.success svg { color: var(--emerald); }
.toast.error svg { color: var(--crimson-hot); }

@keyframes toastIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }

/* ══════════════════════════════════════
   FOOTER
   ══════════════════════════════════════ */
.footer {
  padding: 20px 24px;
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
  margin-top: 24px;
}

.footer a { color: var(--crimson-hot); text-decoration: none; }
.footer a:hover { text-decoration: underline; }

/* ══════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════ */
@media (max-width: 900px) {
  .header-stats { display: none; }
}

@media (max-width: 768px) {
  .header-inner { padding: 0 16px; height: 54px; }
  .brand-name { font-size: 14px; }
  .toolbar { padding: 12px 16px; }
  .content { padding: 0 16px; }
  .search input { width: 120px; }
  .table-wrap { display: none; }
  .cards { display: flex; }
  .detail { margin-top: 12px; }
  .detail-body { max-height: 200px; }
  .modal { min-width: 0; width: 92vw; padding: 20px; }
  .toolbar-right { display: none; }
  .empty { padding: 60px 20px; }
  .footer { margin-top: 16px; }
}

/* ── Load animation ── */
@keyframes stagger {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.load-anim { animation: stagger 0.5s var(--ease) both; }
.load-anim:nth-child(1) { animation-delay: 0s; }
.load-anim:nth-child(2) { animation-delay: 0.05s; }
.load-anim:nth-child(3) { animation-delay: 0.1s; }
.load-anim:nth-child(4) { animation-delay: 0.15s; }
</style>
</head>
<body>
<div class="app">

  <!-- ═══ HEADER ═══ -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 100 80" fill="none">
            <path d="M50 72C50 72 8 50 2 20C2 20 18 35 35 28C35 28 42 22 50 8C58 22 65 28 65 28C82 35 98 20 98 20C92 50 50 72 50 72Z" fill="url(#bg)" stroke="url(#sg)" stroke-width="2"/>
            <defs>
              <linearGradient id="bg" x1="10" y1="10" x2="90" y2="70"><stop stop-color="#dc2626"/><stop offset="1" stop-color="#7f1d1d"/></linearGradient>
              <linearGradient id="sg" x1="10" y1="10" x2="90" y2="70"><stop stop-color="#ef4444"/><stop offset="1" stop-color="#dc2626"/></linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">BATorrent</span>
          <span class="brand-sub">Web Control</span>
        </div>
      </div>

      <div class="header-stats">
        <div class="stat-chip count" id="chipCount">
          <span class="dot"></span>
          <span class="stat-val" id="statCount">0</span>
          <span class="stat-label">Torrents</span>
        </div>
        <div class="stat-chip down" id="chipDown">
          <span class="dot"></span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
          <span class="stat-val" id="statDown">0 B/s</span>
        </div>
        <div class="stat-chip up" id="chipUp">
          <span class="dot"></span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          <span class="stat-val" id="statUp">0 B/s</span>
        </div>
      </div>

      <div class="header-actions">
        <button class="btn" onclick="showModal('magnetModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 15a6 6 0 0 1 12 0v0a6 6 0 0 1-12 0M6 4v8M18 4v8"/><path d="M6 4a3 3 0 0 1 6 0M12 4a3 3 0 0 1 6 0"/></svg>
          Magnet
        </button>
        <button class="btn btn-primary" onclick="showModal('uploadModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload .torrent
        </button>
      </div>
    </div>
  </header>

  <!-- ═══ TOOLBAR ═══ -->
  <div class="toolbar load-anim">
    <div class="toolbar-left">
      <div class="filters" id="filterBar">
        <button class="filter-pill active" onclick="setFilter('all',this)">All<span class="count" id="cAll">0</span></button>
        <button class="filter-pill" onclick="setFilter('downloading',this)">Downloading<span class="count" id="cDown">0</span></button>
        <button class="filter-pill" onclick="setFilter('seeding',this)">Seeding<span class="count" id="cSeed">0</span></button>
        <button class="filter-pill" onclick="setFilter('paused',this)">Paused<span class="count" id="cPause">0</span></button>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search torrents..." oninput="applyFilters()">
      </div>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-sm btn-ghost" onclick="pauseAll()" title="Pause All">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        Pause All
      </button>
      <button class="btn btn-sm btn-ghost" onclick="resumeAll()" title="Resume All">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Resume All
      </button>
    </div>
  </div>

  <!-- ═══ CONTENT ═══ -->
  <div class="content load-anim" style="animation-delay:0.1s">

    <!-- Desktop Table -->
    <div class="table-wrap" id="tableWrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Size</th>
              <th>Progress</th>
              <th>Down</th>
              <th>Up</th>
              <th>Peers</th>
              <th>Ratio</th>
              <th>State</th>
              <th style="width:1%"></th>
            </tr>
          </thead>
          <tbody id="torrentBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Mobile Cards -->
    <div class="cards" id="torrentCards"></div>

    <!-- Empty State -->
    <div class="empty" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <h2>No torrents yet</h2>
      <p>Add a magnet link or upload a .torrent file to get started</p>
      <div class="actions">
        <button class="btn" onclick="showModal('magnetModal')">Add Magnet</button>
        <button class="btn btn-primary" onclick="showModal('uploadModal')">Upload .torrent</button>
      </div>
    </div>

    <!-- Detail Panel -->
    <div class="detail" id="detailPanel">
      <div class="detail-head">
        <span class="detail-name" id="detailName"></span>
        <button class="detail-close" onclick="closeDetail()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="detail-tabs" id="detailTabs">
        <button class="dtab active" onclick="showTab('files',this)">Files</button>
        <button class="dtab" onclick="showTab('peers',this)">Peers</button>
      </div>
      <div class="detail-body" id="detailContent"></div>

  <div class="footer">
    BATorrent WebUI &mdash; Powered by <a>libtorrent</a>
  </div>
</div>

<!-- ═══ MAGNET MODAL ═══ -->
<div class="overlay" id="magnetModal">
  <div class="modal">
    <h2>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 15a6 6 0 0 1 12 0v0a6 6 0 0 1-12 0M6 4v8M18 4v8"/><path d="M6 4a3 3 0 0 1 6 0M12 4a3 3 0 0 1 6 0"/></svg>
      Add Magnet Link
    </h2>
    <input class="modal-input" type="url" id="magnetInput" placeholder="magnet:?xt=urn:btih:...">
    <div class="modal-footer">
      <button class="btn" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="addMagnet()">Add Torrent</button>
    </div>
  </div>
</div>

<!-- ═══ UPLOAD MODAL ═══ -->
<div class="overlay" id="uploadModal">
  <div class="modal">
    <h2>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload Torrent
    </h2>
    <div class="drop-zone" id="fileDrop" onclick="document.getElementById('torrentFile').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>Click to browse or drag & drop</p>
      <span>.torrent files only</span>
      <div class="fname" id="fileName" style="display:none"></div>
    </div>
    <input type="file" id="torrentFile" accept=".torrent" style="display:none" onchange="onFileSelected(this)">
    <div class="modal-footer">
      <button class="btn" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="uploadTorrent()">Upload</button>
    </div>
  </div>
</div>

<script>
let torrents = [], filtered = [], selectedHash = null, detailTab = 'files', currentFilter = 'all';

/* ── Formatting ── */
function fmtBytes(b) {
  if (!b || b === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'], i = Math.floor(Math.log(b) / Math.log(1024));
  return (b / Math.pow(1024, i)).toFixed(i > 1 ? 1 : 0) + ' ' + u[i];
}
function fmtSpeed(b) { return fmtBytes(b) + '/s'; }

/* ── State Classification ── */
function classify(state, paused) {
  if (paused) return 'paused';
  const s = state.toLowerCase();
  if (s.includes('download') || s.includes('baixando')) return 'downloading';
  if (s.includes('seed') || s.includes('semeando')) return 'seeding';
  if (s.includes('check') || s.includes('verificando')) return 'checking';
  if (s.includes('paus')) return 'paused';
  return 'other';
}

function stateLabel(state, paused) {
  if (paused) return 'Paused';
  return state;
}

function progClass(state, paused, progress) {
  if (paused) return 'paused';
  if (progress >= 1) return 'done';
  const c = classify(state, paused);
  return c === 'seeding' ? 'seed' : 'dl';
}

/* ── Filter counts ── */
function updateCounts() {
  const counts = { all: torrents.length, downloading: 0, seeding: 0, paused: 0 };
  torrents.forEach(t => {
    const c = classify(t.state, t.paused);
    if (counts[c] !== undefined) counts[c]++;
  });
  document.getElementById('cAll').textContent = counts.all;
  document.getElementById('cDown').textContent = counts.downloading;
  document.getElementById('cSeed').textContent = counts.seeding;
  document.getElementById('cPause').textContent = counts.paused;
}

/* ── Filtering ── */
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = torrents.filter(t => {
    if (currentFilter !== 'all' && classify(t.state, t.paused) !== currentFilter) return false;
    if (q && !t.name.toLowerCase().includes(q)) return false;
    return true;
  });
  render();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

/* ── Rendering ── */
function render() {
  const tbody = document.getElementById('torrentBody');
  const cards = document.getElementById('torrentCards');
  const empty = document.getElementById('emptyState');
  const wrap = document.getElementById('tableWrap');

  if (!torrents.length) {
    tbody.innerHTML = '';
    cards.innerHTML = '';
    empty.style.display = 'flex';
    wrap.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  wrap.style.display = '';

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:48px;color:var(--text-muted);font-weight:500">No torrents match the current filter</td></tr>';
    cards.innerHTML = '<div style="text-align:center;padding:48px;color:var(--text-muted)">No torrents match</div>';
    return;
  }

  /* Desktop table */
  tbody.innerHTML = filtered.map(t => {
    const cls = classify(t.state, t.paused);
    const pct = (t.progress * 100).toFixed(1);
    const sel = selectedHash === t.hash;
    const ratio = t.ratio != null ? t.ratio.toFixed(2) : '0.00';
    return `<tr class="${sel ? 'selected' : ''}" onclick="selectTorrent('${t.hash}')">
      <td class="t-name" title="${esc(t.name)}">${esc(t.name)}</td>
      <td class="mono">${fmtBytes(t.size)}</td>
      <td><div class="prog"><div class="prog-track"><div class="prog-fill ${progClass(t.state,t.paused,t.progress)}" style="width:${pct}%"></div></div><span class="prog-pct">${pct}%</span></div></td>
      <td class="mono speed-down">${fmtSpeed(t.downloadRate)}</td>
      <td class="mono speed-up">${fmtSpeed(t.uploadRate)}</td>
      <td class="mono">${t.peers}</td>
      <td class="mono">${ratio}</td>
      <td><span class="badge badge-${cls}"><span class="indicator"></span>${stateLabel(t.state,t.paused)}</span></td>
      <td><div class="row-acts">
        ${t.paused
          ? `<button class="btn btn-xs" onclick="event.stopPropagation();doResume('${t.hash}')"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>`
          : `<button class="btn btn-xs" onclick="event.stopPropagation();doPause('${t.hash}')"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg></button>`}
        <button class="btn btn-xs btn-danger" onclick="event.stopPropagation();doRemove('${t.hash}')"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
      </div></td></tr>`;
  }).join('');

  /* Mobile cards */
  cards.innerHTML = filtered.map(t => {
    const cls = classify(t.state, t.paused);
    const pct = (t.progress * 100).toFixed(1);
    const sel = selectedHash === t.hash;
    return `<div class="tcard ${sel?'selected':''}" onclick="selectTorrent('${t.hash}')">
      <div class="tcard-top"><span class="tcard-name">${esc(t.name)}</span><span class="badge badge-${cls}"><span class="indicator"></span>${stateLabel(t.state,t.paused)}</span></div>
      <div class="tcard-prog"><div class="prog" style="width:100%"><div class="prog-track"><div class="prog-fill ${progClass(t.state,t.paused,t.progress)}" style="width:${pct}%"></div></div><span class="prog-pct">${pct}%</span></div></div>
      <div class="tcard-grid">
        <div class="tcard-stat"><span class="k">Size</span><span class="v">${fmtBytes(t.size)}</span></div>
        <div class="tcard-stat"><span class="k">Peers</span><span class="v">${t.peers}</span></div>
        <div class="tcard-stat"><span class="k">Down</span><span class="v speed-down">${fmtSpeed(t.downloadRate)}</span></div>
        <div class="tcard-stat"><span class="k">Up</span><span class="v speed-up">${fmtSpeed(t.uploadRate)}</span></div>
      </div>
      <div class="tcard-acts">
        ${t.paused
          ? `<button class="btn btn-sm" onclick="event.stopPropagation();doResume('${t.hash}')">Resume</button>`
          : `<button class="btn btn-sm" onclick="event.stopPropagation();doPause('${t.hash}')">Pause</button>`}
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();doRemove('${t.hash}')">Remove</button>
      </div></div>`;
  }).join('');
}

/* ── HTML escape ── */
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ── Stats ── */
function updateStats() {
  fetch('/api/status').then(r => r.json()).then(s => {
    document.getElementById('statCount').textContent = s.torrentCount;
    document.getElementById('statDown').textContent = fmtSpeed(s.downloadRate);
    document.getElementById('statUp').textContent = fmtSpeed(s.uploadRate);
    document.getElementById('chipDown').classList.toggle('active', s.downloadRate > 0);
    document.getElementById('chipUp').classList.toggle('active', s.uploadRate > 0);
  }).catch(() => {});
}

/* ── Refresh ── */
function refresh() {
  fetch('/api/torrents').then(r => r.json()).then(data => {
    torrents = data;
    updateCounts();
    applyFilters();
    updateStats();
    if (selectedHash) loadDetail();
  }).catch(() => {});
}

/* ── Selection & Details ── */
function selectTorrent(hash) {
  selectedHash = selectedHash === hash ? null : hash;
  const panel = document.getElementById('detailPanel');
  if (selectedHash) {
    panel.classList.add('open');
    const t = torrents.find(x => x.hash === hash);
    document.getElementById('detailName').textContent = t ? t.name : '';
    loadDetail();
  } else {
    panel.classList.remove('open');
  }
  render();
}

function closeDetail() {
  selectedHash = null;
  document.getElementById('detailPanel').classList.remove('open');
  render();
}

function showTab(tab, el) {
  detailTab = tab;
  document.querySelectorAll('#detailTabs .dtab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadDetail();
}

function loadDetail() {
  if (!selectedHash) return;
  fetch(`/api/torrents/${selectedHash}/${detailTab}`).then(r => r.json()).then(data => {
    const el = document.getElementById('detailContent');
    if (detailTab === 'files') {
      el.innerHTML = `<table><thead><tr><th>File</th><th>Size</th><th>Progress</th></tr></thead><tbody>${data.map(f => {
        const pct = (f.progress * 100).toFixed(1);
        return `<tr><td class="file-path" title="${esc(f.path)}">${esc(f.path)}</td><td class="mono">${fmtBytes(f.size)}</td><td><div class="prog" style="width:130px"><div class="prog-track"><div class="prog-fill dl" style="width:${pct}%"></div></div><span class="prog-pct">${pct}%</span></div></td></tr>`;
      }).join('')}</tbody></table>`;
    } else {
      el.innerHTML = `<table><thead><tr><th>IP</th><th>Port</th><th>Client</th><th>Down</th><th>Up</th><th>Progress</th></tr></thead><tbody>${data.map(p =>
        `<tr><td class="mono">${esc(p.ip)}</td><td class="mono">${p.port}</td><td>${esc(p.client)}</td><td class="mono speed-down">${fmtSpeed(p.downloadRate)}</td><td class="mono speed-up">${fmtSpeed(p.uploadRate)}</td><td class="mono">${(p.progress*100).toFixed(1)}%</td></tr>`
      ).join('')}</tbody></table>`;
    }
  }).catch(() => {});
}

/* ── Actions ── */
function doPause(h) { fetch(`/api/torrents/${h}/pause`, {method:'POST'}).then(refresh); }
function doResume(h) { fetch(`/api/torrents/${h}/resume`, {method:'POST'}).then(refresh); }
function doRemove(h) {
  if (!confirm('Remove this torrent?')) return;
  fetch(`/api/torrents/${h}`, {method:'DELETE'}).then(() => { if (selectedHash === h) closeDetail(); refresh(); });
}
function pauseAll() { torrents.filter(t=>!t.paused).forEach(t=>fetch(`/api/torrents/${t.hash}/pause`,{method:'POST'})); setTimeout(refresh,300); }
function resumeAll() { torrents.filter(t=>t.paused).forEach(t=>fetch(`/api/torrents/${t.hash}/resume`,{method:'POST'})); setTimeout(refresh,300); }

/* ── Modals ── */
function showModal(id) {
  document.getElementById(id).classList.add('open');
  const inp = document.querySelector(`#${id} .modal-input, #${id} input[type="url"]`);
  if (inp) setTimeout(() => inp.focus(), 100);
}

function closeModals() {
  document.querySelectorAll('.overlay').forEach(m => m.classList.remove('open'));
}

function addMagnet() {
  const uri = document.getElementById('magnetInput').value.trim();
  if (!uri || !uri.startsWith('magnet:')) { toast('Please enter a valid magnet link', 'error'); return; }
  fetch('/api/torrents', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({magnet:uri})})
    .then(r => { if (!r.ok) throw new Error(); document.getElementById('magnetInput').value=''; closeModals(); toast('Magnet link added','success'); refresh(); })
    .catch(() => toast('Failed to add magnet link','error'));
}

function uploadTorrent() {
  const input = document.getElementById('torrentFile');
  if (!input.files.length) { toast('Select a .torrent file first','error'); return; }
  const fd = new FormData(); fd.append('file', input.files[0]);
  fetch('/api/torrents', {method:'POST', body:fd})
    .then(r => { if (!r.ok) throw new Error(); input.value=''; document.getElementById('fileName').style.display='none'; closeModals(); toast('Torrent uploaded','success'); refresh(); })
    .catch(() => toast('Failed to upload','error'));
}

/* ── File Drop ── */
function onFileSelected(input) {
  const n = document.getElementById('fileName');
  if (input.files.length) { n.textContent = input.files[0].name; n.style.display = 'block'; }
  else { n.style.display = 'none'; }
}

const drop = document.getElementById('fileDrop');
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.torrent')) {
    const input = document.getElementById('torrentFile');
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    onFileSelected(input);
  }
});

/* ── Toast ── */
function toast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast ${type||''}`;
  const icon = type === 'success'
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
  t.innerHTML = icon + `<span>${esc(msg)}</span>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

/* ── Keyboard ── */
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModals(); });
document.querySelectorAll('.overlay').forEach(m => { m.addEventListener('click', e => { if (e.target === m) closeModals(); }); });

/* ── Init ── */
refresh();
setInterval(refresh, 2000);
</script>
